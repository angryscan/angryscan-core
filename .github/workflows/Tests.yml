name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Checkout Lib
        uses: actions/checkout@v4
        with:
          repository: packetdima/angrydata
          path: lib

      - name: Validate gradle wrappers
        uses: gradle/actions/wrapper-validation@v4

      - name: List files in the working directory
        run: ls -R

      - name: Tests with Gradle Wrapper and XVFB
        uses: coactions/setup-xvfb@v1
        with:
          run: ./gradlew allTests --no-daemon

      - name: Combine benchmark reports
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "## Benchmark Results"
            echo ""
            cat kotlin-lib/build/reports/benchmark-scan.md
            cat kotlin-lib/build/reports/benchmark-init.md
            cat kotlin-lib/build/reports/benchmark-consistency.md
          } > benchmark.md

      - name: Post benchmark results to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const marker = '<!-- benchmark-results -->';
            const body = fs.readFileSync('benchmark.md', 'utf8');
            const fullBody = marker + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
